<!DOCTYPE html>
<html lang="en">
<head>

  <title>Events — Avec Anima</title>
  <meta name="description" content="Upcoming and previous Avec Anima events on the Isle of Man.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="nav">
    <div class="container">
      <a href="index.html" class="nav__logo">
        <img src="assets/logo.png" alt="Avec Anima">

      <div class="nav__links">
        <a href="index.html">Home</a>
        <a href="events.html" class="is-active">Events</a>

  <header class="section container" style="padding-bottom: 0;">

      <a href="#upcoming" class="btn btn--outline">Upcoming</a>
      <a href="#previous" class="btn btn--outline">Previous</a>
    </div>

  <section class="section container" id="upcoming">
    <div class="section-header">
      <h2 class="section-title" style="font-size: clamp(28px, 4vw, 40px);">Upcoming</h2>
    </div>

    <div class="section-header">
      <h2 class="section-title" style="font-size: clamp(28px, 4vw, 40px);">Previous</h2>
    </div>
    <div class="event-grid" id="previous-events">
      <p class="events-empty">Loading events&hellip;</p>
    </div>

  <footer class="footer">

        <div class="footer__col">
          <a href="index.html">Home</a>
